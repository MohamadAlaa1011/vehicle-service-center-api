version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: vehicle_service_postgres
    restart: always
    environment:
      POSTGRES_DB: vehicle_service_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vehicle_service_network

  api:
    build: .
    container_name: vehicle_service_api
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_DATABASE: vehicle_service_center
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - vehicle_service_network

volumes:
  postgres_data:

networks:
  vehicle_service_network:
    driver: bridge